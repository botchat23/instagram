<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Sign Up</title>
    <link rel="stylesheet" href="signup-style.css">
</head>
<body>
    <div class="container">
        <div class="signup-box">
            <div class="instagram-logo">
                <img src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a4.png" alt="Instagram">
            </div>
            
            <p class="tagline">Sign up to see photos and videos from your friends.</p>
            
            <div class="facebook-signup">
                <a href="#" id="facebookSignup">
                    <span>Log in with Facebook</span>
                </a>
            </div>
            
            <div class="divider">OR</div>
            
            <form id="signupForm">
                <div class="form-group">
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Mobile number or email" 
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>
                
                <div class="form-group">
                    <input 
                        type="text" 
                        id="fullname" 
                        placeholder="Full Name" 
                        required
                    >
                    <span class="error-message" id="fullnameError"></span>
                </div>
                
                <div class="form-group">
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Username" 
                        required
                    >
                    <span class="error-message" id="usernameError"></span>
                </div>
                
                <div class="form-group">
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Password" 
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            Show
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                </div>
                
                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="agreeTerms" required>
                        <span>I agree to the <a href="#">Terms and Data Policy</a></span>
                    </label>
                    <span class="error-message" id="termsError"></span>
                </div>
                
                <button type="submit" class="signup-btn" id="signupBtn">Sign up</button>
            </form>
            
            <div class="login-link">
                <p>Have an account? <a href="index.html">Log in</a></p>
            </div>
        </div>
    </div>

    <script src="signup-script.js"></script>
</body>
</html>
